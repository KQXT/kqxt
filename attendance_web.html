<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>考勤记录处理工具</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Microsoft YaHei', sans-serif; background: #f0f2f5; color: #333; }
.header { background: #1677ff; color: #fff; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
.header h1 { font-size: 20px; font-weight: 600; }
.header .version { font-size: 12px; opacity: 0.7; margin-top: 2px; }
.container { max-width: 1200px; margin: 24px auto; padding: 0 16px; }
.card { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 16px; overflow: hidden; }
.card-header { padding: 14px 20px; border-bottom: 1px solid #f0f0f0; font-weight: 600; font-size: 15px; display: flex; align-items: center; gap: 8px; }
.card-body { padding: 20px; }
.upload-area { border: 2px dashed #d9d9d9; border-radius: 8px; text-align: center; padding: 40px 20px; cursor: pointer; transition: all 0.2s; background: #fafafa; }
.upload-area:hover, .upload-area.drag-over { border-color: #1677ff; background: #e8f4ff; }
.upload-area .icon { font-size: 40px; margin-bottom: 12px; }
.upload-area p { color: #666; margin-bottom: 8px; }
.upload-area .hint { font-size: 12px; color: #999; }
#fileInput { display: none; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 18px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; font-family: inherit; transition: all 0.2s; }
.btn-primary { background: #1677ff; color: #fff; }
.btn-primary:hover { background: #0958d9; }
.btn-primary:disabled { background: #91caff; cursor: not-allowed; }
.btn-success { background: #52c41a; color: #fff; }
.btn-success:hover { background: #389e0d; }
.btn-success:disabled { background: #b7eb8f; cursor: not-allowed; }
.btn-default { background: #fff; color: #333; border: 1px solid #d9d9d9; }
.btn-default:hover { border-color: #1677ff; color: #1677ff; }
.actions { display: flex; gap: 12px; flex-wrap: wrap; }
.progress-bar { height: 6px; background: #f0f0f0; border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
.progress-bar .fill { height: 100%; background: #1677ff; border-radius: 3px; transition: width 0.3s; }
.log-area { max-height: 200px; overflow-y: auto; background: #1a1a2e; color: #a9b7c6; padding: 12px; border-radius: 6px; font-size: 12px; font-family: 'Consolas', monospace; }
.log-area .log-ok { color: #6fc68e; }
.log-area .log-warn { color: #f0b46c; }
.log-area .log-err { color: #f07070; }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
.stat-card { background: #f8f9fa; border-radius: 6px; padding: 12px; text-align: center; }
.stat-card .num { font-size: 24px; font-weight: 700; color: #1677ff; }
.stat-card .label { font-size: 12px; color: #888; margin-top: 4px; }
.table-wrap { overflow: auto; max-height: 500px; border: 1px solid #f0f0f0; border-radius: 6px; }
table { border-collapse: collapse; font-size: 12px; white-space: nowrap; }
th { background: #fafafa; position: sticky; top: 0; z-index: 10; padding: 8px 10px; border: 1px solid #e8e8e8; font-weight: 600; text-align: center; }
td { padding: 4px 8px; border: 1px solid #e8e8e8; vertical-align: top; text-align: center; max-width: 100px; }
td.punch-cell { white-space: pre-wrap; text-align: left; font-size: 11px; line-height: 1.6; }
.red { color: #ff4d4f; }
.orange-bg { background: #fff7e6; }
.hidden { display: none; }
.tag { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
.tag-green { background: #f6ffed; color: #52c41a; border: 1px solid #b7eb8f; }
.tag-blue { background: #e8f4ff; color: #1677ff; border: 1px solid #91caff; }
</style>
</head>
<body>
<div class="header">
  <div>
    <h1>📊 考勤记录处理工具</h1>
    <div class="version">v2.0 · 支持66个部门 · 自动班次匹配</div>
  </div>
</div>

<div class="container">
  <!-- 上传区 -->
  <div class="card">
    <div class="card-header">📂 上传原始考勤文件（得力系统导出）</div>
    <div class="card-body">
      <div class="upload-area" id="uploadArea">
        <div class="icon">📄</div>
        <p>点击选择或拖拽 Excel 文件到此处</p>
        <p class="hint">支持 .xlsx 格式（得力系统导出的原始考勤表）</p>
      </div>
      <input type="file" id="fileInput" accept=".xlsx,.xls">
      <div id="fileInfo" class="hidden" style="margin-top:12px; padding:10px; background:#f6ffed; border-radius:6px; color:#52c41a; font-size:13px;"></div>
      <!-- 当文件缺少日期表头时，显示月份补填框 -->
      <div id="monthPickerBox" class="hidden" style="margin-top:10px; padding:10px; background:#fffbe6; border:1px solid #ffe58f; border-radius:6px; font-size:13px;">
        ⚠️ 未检测到日期表头（周六/周日标识），请补填考勤月份以正确标识周末：
        <input type="number" id="inputYear" min="2020" max="2099" placeholder="年份" style="width:70px; margin:0 4px; padding:3px 6px; border:1px solid #d9d9d9; border-radius:4px;">
        年
        <input type="number" id="inputMonth" min="1" max="12" placeholder="月" style="width:50px; margin:0 4px; padding:3px 6px; border:1px solid #d9d9d9; border-radius:4px;">
        月
        <button onclick="applyManualMonth()" style="margin-left:8px; padding:3px 12px; background:#1890ff; color:#fff; border:none; border-radius:4px; cursor:pointer;">确认</button>
        <span id="monthPickerStatus" style="margin-left:8px; color:#52c41a;"></span>
      </div>
    </div>
  </div>

  <!-- 操作区 -->
  <div class="card">
    <div class="card-header">⚙️ 操作</div>
    <div class="card-body">
      <div class="actions">
        <button class="btn btn-primary" id="btnProcess" disabled onclick="startProcess()">▶ 开始处理</button>
        <button class="btn btn-success" id="btnExport" disabled onclick="exportExcel()">⬇ 导出Excel</button>
        <button class="btn btn-default" onclick="resetAll()">🔄 重置</button>
      </div>
      <div id="progressArea" class="hidden" style="margin-top:16px;">
        <div style="display:flex; justify-content:space-between; font-size:12px; color:#666; margin-bottom:6px;">
          <span id="progressLabel">处理中...</span>
          <span id="progressPct">0%</span>
        </div>
        <div class="progress-bar"><div class="fill" id="progressFill" style="width:0"></div></div>
        <div class="log-area" id="logArea"></div>
      </div>
    </div>
  </div>

  <!-- 统计摘要 -->
  <div class="card hidden" id="summaryCard">
    <div class="card-header">📈 处理结果摘要</div>
    <div class="card-body">
      <div class="stats-grid" id="statsGrid"></div>
    </div>
  </div>

  <!-- 预览表格 -->
  <div class="card hidden" id="previewCard">
    <div class="card-header">
      👁 数据预览（前20行）
      <span class="tag tag-blue" style="margin-left:auto; font-size:11px;">橙色=周末 | 红色=迟到/缺卡/加班</span>
    </div>
    <div class="card-body">
      <div class="table-wrap" id="previewTable"></div>
    </div>
  </div>
</div>

<script>
// ============================================================
// 部门班次配置 — 从 config.json 动态加载
// ============================================================
let ALIAS_MAP = {};
let DEPT_SHIFTS = {};

// 获取当前HTML所在路径，自动加载同目录下的config.json
const CONFIG_URL = (document.currentScript?.src || location.href).replace(/[^/]*$/, '') + 'config.json';

async function loadConfig() {
  try {
    const resp = await fetch(CONFIG_URL);
    if (!resp.ok) throw new Error('config.json 加载失败: ' + resp.status);
    const config = await resp.json();
    ALIAS_MAP = config.ALIAS_MAP || {};
    DEPT_SHIFTS = config.DEPT_SHIFTS || {};
    logMsg('ok', '班次配置已加载，共 ' + Object.keys(DEPT_SHIFTS).length + ' 个部门');
    return true;
  } catch (e) {
    logMsg('err', '加载config.json失败: ' + e.message);
    return false;
  }
}

// ============================================================
// 通用班次模板（用于部门无配置或班次不全时的自动推断）
// ============================================================
const UNIVERSAL_SHIFTS = [
  {start:'07:00', end:'16:30', net_h:8},
  {start:'07:30', end:'17:00', net_h:8},
  {start:'08:00', end:'17:30', net_h:8},
  {start:'09:00', end:'19:00', net_h:8},
  {start:'10:00', end:'20:00', net_h:8},
  {start:'13:30', end:'22:00', net_h:8},
  {start:'15:00', end:'23:30', net_h:8},
  {start:'08:00', end:'12:00', net_h:4},
  {start:'13:30', end:'17:30', net_h:4},
];

// ============================================================
// 工具函数
// ============================================================
function parseShiftTime(s) {
  if (!s) return null;
  const [h, m] = s.split(':').map(Number);
  return h * 60 + m;
}

function timeToMin(t) { return t.h * 60 + t.m; }

function getDeptShifts(dept) {
  if (!dept) return [];
  let val = DEPT_SHIFTS[dept];
  if (!val) {
    // 模糊匹配
    for (const [d, v] of Object.entries(DEPT_SHIFTS)) {
      if (Array.isArray(v) && (dept.includes(d) || d.includes(dept))) return v;
    }
    return [];
  }
  if (Array.isArray(val)) return val;
  if (typeof val === 'string' && val.startsWith('SAME_AS_')) {
    const refDept = ALIAS_MAP[val] || '';
    if (refDept && DEPT_SHIFTS[refDept]) {
      const rv = DEPT_SHIFTS[refDept];
      if (Array.isArray(rv)) return rv;
    }
  }
  return [];
}

// 解析打卡时间字符串为 [{h,m}] 数组
function parseTimes(str) {
  if (!str || str.trim() === '' || str.trim() === '-') return [];
  const times = [];
  for (const line of str.split('\n')) {
    const t = line.trim();
    if (!t || t === '-') continue;
    if (t.includes(':')) {
      const [h, m] = t.split(':').map(Number);
      if (!isNaN(h) && !isNaN(m)) times.push({h, m});
    }
  }
  // 排序：凌晨(h<5)放后面
  times.sort((a, b) => {
    const ka = a.h < 5 ? 1440 + a.h * 60 + a.m : a.h * 60 + a.m;
    const kb = b.h < 5 ? 1440 + b.h * 60 + b.m : b.h * 60 + b.m;
    return ka - kb;
  });
  return times;
}

// 去重（间隔<5分钟合并）
function dedupTimes(times) {
  if (times.length <= 1) return times;
  const res = [times[0]];
  for (let i = 1; i < times.length; i++) {
    let gap = timeToMin(times[i]) - timeToMin(res[res.length - 1]);
    if (gap < 0) gap += 1440;
    if (gap >= 5) res.push(times[i]);
  }
  return res;
}

// 班次匹配（四条件匹配法：能上满 + 最接近 + 优先不迟到 + 卡型吻合）
// useUniversal=true 时用通用班次模板（用于部门无配置或班次不全时）
function inferShiftFromDept(times, dept, useUniversal) {
  // 四条件匹配（按优先级）：
  // 1. 能上满：最后一张打卡 >= 班次正常下班时间（允许合理提前5分钟）
  // 2. 最接近：第一张上班打卡离哪个班次start最近
  // 3. 同距离时优先不迟到：距离相等的班次中，优先选第一张打卡 <= 班次start的
  // 4. 同距离+同迟到时，优先卡型吻合的班次
  let shifts = getDeptShifts(dept);
  // 部门无配置或强制使用通用模板时，用 UNIVERSAL_SHIFTS
  if (!shifts.length || useUniversal) shifts = UNIVERSAL_SHIFTS;
  const normalTimes = times.filter(t => t.h >= 6);
  if (!normalTimes.length) return null;

  const firstPunch = normalTimes[0];
  const firstPunchMin = timeToMin(firstPunch);
  const lastPunch = times[times.length - 1];
  const lastPunchMin = timeToMin(lastPunch);

  const hasMorning = normalTimes.some(t => t.h < 12);
  const hasAfternoon = normalTimes.some(t => t.h >= 13);

  // ── 条件1：筛选能上满半天/一天的班次 ──
  const canFill = [];
  for (const shift of shifts) {
    const sStart = parseShiftTime(shift.start);
    const sEnd = parseShiftTime(shift.end);
    if (sStart === null || sEnd === null) continue;

    // 晚班特殊（上班>=15:00）：没有上午卡才考虑晚班
    if (sStart >= 15 * 60 && hasMorning) continue;

    // 半天班特殊：
    // 上午半天（下班<=12:00）：有下午卡不可能是上午半天
    if (sEnd <= 12 * 60 && hasAfternoon) continue;
    // 下午半天（上班>=13:30）：有上午卡不可能是下午半天
    if (sStart >= 13 * 60 && hasMorning) continue;

    // 判断最后一张打卡是否打到班次正常下班时间或之后
    let lastGteEnd;
    if (sEnd <= 30) {
      // 跨天班次（如下班00:00），凌晨卡也算
      lastGteEnd = (lastPunchMin <= sStart && lastPunchMin + 24 * 60 >= sEnd) ||
                   lastPunchMin >= sEnd;
    } else {
      lastGteEnd = lastPunchMin >= sEnd - 5;  // 允许5分钟提前
    }

    if (lastGteEnd) canFill.push(shift);
  }

  // ── 条件2：在能上满的班次中，选最接近的 ──
  let pool;
  if (!canFill.length) {
    // 没有能上满的班次，回退：直接按最接近选（不要求上满）
    const fallback = shifts.filter(s => parseShiftTime(s.start) !== null);
    if (!fallback.length) return null;
    pool = fallback;
  } else {
    pool = canFill;
  }

  // 按第一张打卡与班次start的距离排序
  pool.sort((a, b) =>
    Math.abs(firstPunchMin - parseShiftTime(a.start)) -
    Math.abs(firstPunchMin - parseShiftTime(b.start))
  );

  // ── 条件3：同距离时优先不迟到的 ──
  const bestDist = Math.abs(firstPunchMin - parseShiftTime(pool[0].start));
  const sameDist = pool.filter(s => Math.abs(firstPunchMin - parseShiftTime(s.start)) === bestDist);

  if (sameDist.length === 1) return sameDist[0];

  // 距离相同时，优先选不迟到的（第一张打卡 <= 班次start）
  const notLate = sameDist.filter(s => firstPunchMin <= parseShiftTime(s.start));
  if (notLate.length === 1) return notLate[0];
  const pool3 = notLate.length ? notLate : sameDist;
  if (pool3.length === 1) return pool3[0];

  // ── 条件4：卡型吻合度 ──
  // 根据实际打卡分布与班次预期卡型的匹配程度打分
  const cls = classifyPunchTimes(times);
  const hasMornCard = cls.morning_start.length > 0;
  const hasNoonCard = cls.noon_end.length > 0;
  const hasAftStart = cls.afternoon_start.length > 0;
  const hasAftEnd = cls.afternoon_end.length > 0;
  const hasOtEnd = cls.overtime_end.length > 0;

  const scored = pool3.map(s => {
    const sStart = parseShiftTime(s.start);
    const sEnd = parseShiftTime(s.end);
    const netH = s.net_h || 8;
    let score = 0;

    if (sStart >= 13 * 60 && netH < 5) {
      // 下午半天班（13:30-17:30等）：期望有afternoon卡，没有morning卡
      if (hasAftStart) score += 3;
      if (!hasMornCard) score += 2;
      if (hasAftEnd) score += 1;
    } else if (sEnd <= 12 * 60 + 5 && netH <= 5) {
      // 上午半天班（8:00-12:00等）：期望有morning+noon卡，没有afternoon卡
      if (hasMornCard) score += 3;
      if (hasNoonCard) score += 2;
      if (!hasAftStart) score += 1;
    } else if (sStart >= 13 * 60 && netH >= 8) {
      // 下午全天班（13:30-22:00等）：期望有afternoon+overtime卡，没有morning卡
      if (hasAftStart) score += 3;
      if (hasOtEnd) score += 2;
      if (!hasMornCard) score += 2;
    } else {
      // 普通全天班（8:00-17:30、9:00-19:00等）：期望有morning卡
      if (hasMornCard) score += 3;
      if (hasNoonCard) score += 1;
    }

    return { shift: s, score };
  });

  scored.sort((a, b) => b.score - a.score);
  return scored[0].shift;
}

// 获取部门所有班次中最早的上班时间（用于迟到判断基准）
// 返回分钟数，无班次时返回null
function getDeptEarliestStart(dept) {
  const shifts = getDeptShifts(dept);
  if (!shifts.length) return null;
  let earliest = null;
  for (const s of shifts) {
    const m = parseShiftTime(s.start);
    if (m === null) continue;
    // 跳过半天班中的下午半天（start>=13:30），它们不影响上午迟到判断
    if (m >= 13 * 60 && (s.net_h || 8) < 5) continue;
    if (earliest === null || m < earliest) earliest = m;
  }
  return earliest;
}

// 统一的最佳班次推断函数
// 返回完整的班次对象 {start, end, net_h, break_min, ...} 或 null
// 优先用部门配置，匹配不合理时自动用通用模板兜底
function getBestShift(times, dept) {
  const normal = times.filter(t => t.h >= 6);
  if (!normal.length) return null;
  const firstPunchMin = timeToMin(normal[0]);

  // 1. 优先用部门配置匹配
  const shift = inferShiftFromDept(times, dept);
  if (shift) {
    const shiftStartMin = parseShiftTime(shift.start);
    const dist = Math.abs(firstPunchMin - shiftStartMin);
    // 距离<=30分钟认为匹配合理，直接用部门配置
    if (dist <= 30) return shift;
    // 距离太远，说明部门班次不全，尝试通用模板
    const uShift = inferShiftFromDept(times, dept, true);
    if (uShift) {
      const uDist = Math.abs(firstPunchMin - parseShiftTime(uShift.start));
      // 通用模板更近才替换，否则保留部门配置
      if (uDist < dist) return uShift;
    }
    return shift;
  }

  // 2. 部门无配置，用通用模板
  const uShift = inferShiftFromDept(times, dept, true);
  return uShift || null;
}

function getShiftStartFromDept(times, dept) {
  if (dept.includes('保安') || dept.includes('卫生')) {
    const normal = times.filter(t => t.h >= 6);
    if (normal.length && normal.some(t => t.h < 12)) return {h:6, m:30};
    return {h:16, m:0};
  }
  const best = getBestShift(times, dept);
  if (best) {
    const [h, m] = best.start.split(':').map(Number);
    return {h, m};
  }
  const normal = times.filter(t => t.h >= 6);
  if (!normal.length) return {h:8, m:0};
  // 最终兜底：按第一张打卡小时推断（整点）
  const first = normal[0];
  if (first.h <= 7) return {h:7, m:0};
  if (first.h === 8) return {h:8, m:0};
  if (first.h === 9) return {h:9, m:0};
  if (first.h === 10) return {h:10, m:0};
  if (first.h === 13) return {h:13, m:30};
  if (first.h >= 15) return {h:15, m:0};
  return {h:first.h, m:0};
}

// 打卡分类
function classifyPunchTimes(times) {
  const result = {morning_start:[], noon_end:[], afternoon_start:[], afternoon_end:[], overtime_start:[], overtime_end:[]};
  if (!times.length) return result;

  const hasNormal = times.some(t => t.h >= 5);
  const midnightIndices = new Set();
  if (hasNormal) {
    for (let i = times.length - 1; i >= 0; i--) {
      if (times[i].h < 5) midnightIndices.add(i);
      else break;
    }
  }

  const noonBuffer = [];
  for (let idx = 0; idx < times.length; idx++) {
    const t = times[idx];
    const tm = timeToMin(t);
    if (midnightIndices.has(idx)) { result.overtime_end.push(t); continue; }
    if (tm < 12 * 60) { result.morning_start.push(t); }
    else if (tm < 13 * 60 + 30) { noonBuffer.push({idx, t}); }
    else if (tm < 17 * 60 + 30) { result.afternoon_start.push(t); }
    else if (tm < 17 * 60 + 50) { result.afternoon_end.push(t); }
    else if (tm < 18 * 60) { result.overtime_start.push(t); }
    else { result.overtime_end.push(t); }
  }

  noonBuffer.sort((a,b) => a.idx - b.idx);
  const gapFlags = [false];
  for (let i = 1; i < noonBuffer.length; i++) {
    gapFlags.push(timeToMin(noonBuffer[i].t) - timeToMin(noonBuffer[i-1].t) > 5);
  }
  let noonCount = 0;
  for (let i = 0; i < noonBuffer.length; i++) {
    const {t} = noonBuffer[i];
    const tm = timeToMin(t);
    if (tm >= 13 * 60 + 15) { result.afternoon_start.push(t); }
    else if (tm < 12 * 60 + 30) {
      if (gapFlags[i] && noonCount > 0) result.afternoon_start.push(t);
      else { result.noon_end.push(t); noonCount++; }
    } else {
      if (noonCount > 0) { result.afternoon_start.push(t); }
      else if (i + 1 < noonBuffer.length) { result.noon_end.push(t); noonCount++; }
      else result.afternoon_start.push(t);
    }
  }
  for (const k of Object.keys(result)) result[k].sort((a,b) => timeToMin(a)-timeToMin(b));
  return result;
}

function adjustClassified(cls, dept, times) {
  if (!cls.afternoon_end.length && cls.afternoon_start.length) {
    const last = cls.afternoon_start[cls.afternoon_start.length-1];
    if (timeToMin(last) >= 16*60) {
      cls.afternoon_end = [last];
      cls.afternoon_start = cls.afternoon_start.slice(0,-1);
    }
  }
  if (!cls.afternoon_end.length && !cls.overtime_start.length && cls.afternoon_start.length && times) {
    const normal = times.filter(t=>t.h>=6).sort((a,b)=>timeToMin(a)-timeToMin(b));
    if (normal.length) {
      const last = normal[normal.length-1];
      const lm = timeToMin(last);
      if (lm >= 13*60+30 && lm < 17*60+30) {
        cls.afternoon_end = [last];
        cls.afternoon_start = cls.afternoon_start.slice(0,-1);
      }
    }
  }
  if (!cls.afternoon_end.length && !cls.overtime_end.length && cls.overtime_start.length) {
    cls.afternoon_end = [cls.overtime_start[cls.overtime_start.length-1]];
    cls.overtime_start = cls.overtime_start.slice(0,-1);
  }
  if (cls.overtime_end.length && !cls.overtime_start.length && !cls.afternoon_end.length) {
    cls.afternoon_end = [cls.overtime_end[cls.overtime_end.length-1]];
    cls.overtime_end = cls.overtime_end.slice(0,-1);
  }
  return cls;
}

// 推断缺失的上午上班时间（前后天参考）
function inferMissingMorningStart(dayIdx, processedDays, dept) {
  function getMorning(idx) {
    if (idx < 0 || idx >= processedDays.length) return null;
    const ts = processedDays[idx];
    if (!ts || ts.trim() === '' || ts.trim() === '-') return null;
    let times = parseTimes(ts);
    times = dedupTimes(times);
    const cls = classifyPunchTimes(times);
    if (cls.morning_start.length) {
      return getShiftStartFromDept(times, dept);
    }
    return null;
  }
  return getMorning(dayIdx-1) || getMorning(dayIdx+1);
}

// 计算全天工时
function calculateAllHours(times, dept, dayIdx, processedDays) {
  if (!times.length) return {morning:0, afternoon:0, night:0, total:0};
  const midCutoff = (dept.includes('保安') || dept.includes('卫生')) ? 5 : 6;
  const midnightCards = times.filter(t=>t.h<midCutoff);
  const normalCards = times.filter(t=>t.h>=midCutoff);
  if (midnightCards.length && !normalCards.length) return {morning:0, afternoon:0, night:0, total:0};

  const hasMorningCard = times.some(t=>t.h>=midCutoff && t.h<12);
  const hasAfternoonCard = times.some(t=>t.h>=13);

  // 只有下午/晚上（无上午卡）→ 用班次推断计算
  if (hasAfternoonCard && !hasMorningCard) {
    const nc = times.filter(t=>t.h>=6).sort((a,b)=>timeToMin(a)-timeToMin(b));
    if (!nc.length) return {morning:0, afternoon:0, night:0, total:0};
    const firstMin = timeToMin(nc[0]);
    let lastMin = timeToMin(nc[nc.length-1]);
    if (midnightCards.length) lastMin = 24*60 + timeToMin(midnightCards[midnightCards.length-1]);

    // 用班次推断来计算工时
    const matchedShift = getBestShift(times, dept);
    let totalH = 0;

    if (matchedShift) {
      const sStart = parseShiftTime(matchedShift.start);
      const netH = matchedShift.net_h || 8;

      if (netH <= 5) {
        // 半天班：工时 = 第一张卡到班次下班时间（net_h小时）
        // 但不超过实际打卡时间跨度
        const sEnd = parseShiftTime(matchedShift.end);
        let endMin = sEnd <= 30 ? sEnd + 24*60 : sEnd; // 跨天处理
        if (endMin <= sStart) endMin += 24*60; // 防止endMin < sStart
        totalH = Math.min(netH, (lastMin - firstMin) / 60);
        if (totalH < 0) totalH = 0;
      } else {
        // 全天班：工时 = min(实际跨度, 班次净工时)
        const elapsed = (lastMin - firstMin) / 60;
        totalH = Math.min(netH, elapsed);
        if (totalH < 0) totalH = 0;
      }
    } else {
      // 无班次匹配兜底：按实际打卡跨度计算
      totalH = (lastMin - firstMin) / 60;
      if (totalH < 0) totalH = 0;
    }
    return {morning:0, afternoon:totalH, night:0, total:totalH};
  }

  // 正常（有上午卡）
  let cls = classifyPunchTimes(times);
  cls = adjustClassified(cls, dept, times);

  let mornHours=0, afHours=0, nightHours=0;

  // 推断上班时间 & 获取班次配置
  let morningStart = null;
  let matchedShift = null;
  if (cls.morning_start.length) {
    morningStart = getShiftStartFromDept(times, dept);
    matchedShift = getBestShift(times, dept);
  } else if (cls.noon_end.length && dayIdx !== undefined && processedDays) {
    morningStart = inferMissingMorningStart(dayIdx, processedDays, dept);
  }
  // 缺上午上班卡但有noon_end：用noon_end反推（默认上午工作4h）
  // 有noon_end说明上午来了，只是没打卡，不应算成半天
  if (!morningStart && cls.noon_end.length) {
    const best = getBestShift(times, dept);
    if (best) {
      const [h, m] = best.start.split(':').map(Number);
      morningStart = {h, m};
      matchedShift = best;
    } else {
      // 无班次匹配，用noon_end反推4h
      const noonEnd = cls.noon_end[0];
      let inferredMin = timeToMin(noonEnd) - 4 * 60;
      if (inferredMin < 6 * 60) inferredMin = 7 * 60; // 不早于7:00
      morningStart = {h: Math.floor(inferredMin / 60), m: inferredMin % 60};
    }
  }

  // 上午工时
  if (morningStart) {
    const noonCutoff = dept.includes('保安') ? {h:11,m:50} : {h:12,m:0};
    let mornEndMin = timeToMin(noonCutoff); // 默认算到12:00

    // 如果有下午卡（afternoon_start/end或overtime），说明全天班，上午到12:00
    const hasAnyAfternoon = cls.afternoon_start.length || cls.afternoon_end.length || cls.overtime_start.length || cls.overtime_end.length;
    if (!cls.noon_end.length && !hasAnyAfternoon) {
      // 没有noon_end也没有任何下午卡 → 可能是半天班（只有上午）
      // 用最后一张morning_start卡作为上午实际截止
      if (cls.morning_start.length) {
        const lastMorn = cls.morning_start[cls.morning_start.length - 1];
        mornEndMin = Math.min(timeToMin(noonCutoff), timeToMin(lastMorn));
      }
    }

    // 起算点 = max(morningStart, 第一张上午卡)：迟到时段不算工时
    let mornStartMin = timeToMin(morningStart);
    if (cls.morning_start.length) {
      const firstMornCardMin = timeToMin(cls.morning_start[0]);
      mornStartMin = Math.max(mornStartMin, firstMornCardMin);
    }

    const mornMin = mornEndMin - mornStartMin;
    if (mornMin > 0) mornHours = mornMin / 60;
  }

  // 下午工时（用班次正常下班时间）
  const hasAfWork = cls.afternoon_end.length || cls.overtime_start.length || cls.overtime_end.length || cls.afternoon_start.length;
  if (hasAfWork) {
    const afStart = {h:13, m:30};
    let normalEndTime = {h:17, m:30};
    if (morningStart) {
      if (morningStart.h === 7 && morningStart.m === 0) normalEndTime = {h:16, m:30};
      else if (morningStart.h === 7 && morningStart.m === 30) normalEndTime = {h:17, m:0};
      else if (morningStart.h === 9) normalEndTime = {h:19, m:0};
      else if (morningStart.h === 10) normalEndTime = {h:20, m:0};
      else if (morningStart.h === 13) normalEndTime = {h:22, m:0};
      else if (morningStart.h === 15) normalEndTime = {h:23, m:30};
    }
    const hasOT = cls.overtime_end.length > 0;
    let afEnd;
    if (hasOT) {
      afEnd = normalEndTime;
    } else if (cls.overtime_start.length && !cls.overtime_end.length) {
      afEnd = normalEndTime;
    } else if (cls.afternoon_end.length) {
      afEnd = cls.afternoon_end[cls.afternoon_end.length-1];
      if (timeToMin(afEnd) > timeToMin(normalEndTime)) afEnd = normalEndTime;
    } else if (cls.afternoon_start.length) {
      afEnd = normalEndTime;
    } else {
      afEnd = normalEndTime;
    }
    let afMin = timeToMin(afEnd) - timeToMin(afStart);
    // 根据班次配置的break_min扣除下午休息时间（如9:00/10:00班break_min=30）
    // 8:00班break_min=0则不扣，12:00-13:30的1.5h已在起算点自然扣除
    const breakMin = (matchedShift && matchedShift.break_min) ? matchedShift.break_min : 0;
    if (breakMin > 0 && afMin >= breakMin) afMin -= breakMin;
    if (afMin > 0) afHours = afMin / 60;
  }

  // 晚上加班工时
  if (cls.overtime_end.length) {
    const lastOT = cls.overtime_end[cls.overtime_end.length-1];
    let otStart = {h:18, m:0};
    if (morningStart) {
      if (morningStart.h === 9) otStart = {h:19, m:0};
      else if (morningStart.h === 10) otStart = {h:20, m:0};
    }
    let nightMin;
    if (lastOT.h < 6) {
      nightMin = (24*60 - timeToMin(otStart)) + timeToMin(lastOT);
    } else {
      nightMin = timeToMin(lastOT) - timeToMin(otStart);
    }
    if (nightMin > 0) nightHours = nightMin / 60;
  }

  const total = mornHours + afHours + nightHours;
  return {morning: mornHours, afternoon: afHours, night: nightHours, total};
}

// 出勤+加班计算
function calcShiftAndOvertime(times, dept, dayIdx, processedDays) {
  const noOt = dept.includes('保安') || dept.includes('卫生');
  if (noOt) {
    return {attendanceDays: times.length ? 1 : 0, paidDays: times.length ? 1 : 0, overtimeHours: 0, halfDay: false};
  }
  if (!times.length) return {attendanceDays:0, paidDays:0, overtimeHours:0, halfDay:false};

  const {total: totalH} = calculateAllHours(times, dept, dayIdx, processedDays);
  let attendanceDays = totalH >= 8 ? 1 : totalH >= 4 ? 0.5 : 0;
  const standardH = attendanceDays >= 1 ? 8 : attendanceDays >= 0.5 ? 4 : 0;
  let rawOt = totalH - standardH;

  let paidDays = attendanceDays;
  let remainOt = rawOt;
  if (rawOt > 0) {
    const needed = 1 - paidDays;
    if (needed > 0) {
      let maxConvert = Math.floor(rawOt / 4) * 0.5;
      if (maxConvert > needed) maxConvert = needed;
      paidDays += maxConvert;
      remainOt = rawOt - maxConvert * 8;
    }
  }

  let overtimeHours = 0;
  if (remainOt > 0) {
    const ot = Math.floor(remainOt * 2) * 0.5;
    if (ot >= 1) overtimeHours = ot;
  } else if (remainOt < 0) {
    overtimeHours = Math.floor(remainOt * 2) * 0.5;
  }

  // 半天标记：出勤0.5天时标记半天
  // 排除有下午上班卡的case（有afternoon_start说明是全天上班但工时不够半天的不算）
  const hasAfStart = times.some(t => t.h >= 13 && t.h < 17);
  const halfDay = (attendanceDays === 0.5 && !hasAfStart);

  return {attendanceDays, paidDays, overtimeHours, halfDay};
}

// 缺卡计算
function calcMissingCards(times, dept) {
  if (!times.length) return {count:0, types:[]};

  // 保安/卫生组06:30上班，05:xx可能是早到，不算凌晨卡
  const midCutoff = (dept.includes('保安') || dept.includes('卫生')) ? 5 : 6;
  const midnight = times.filter(t=>t.h<midCutoff);
  let normal = times.filter(t=>t.h>=midCutoff);
  if (midnight.length && !normal.length) return {count:0, types:[]};
  if (midnight.length && normal.length) times = normal;
  normal = times.filter(t=>t.h>=midCutoff);
  if (!normal.length) return {count:0, types:[]};

  const hasAfCard = normal.some(t=>t.h>=13);
  const hasMornCard = normal.some(t=>t.h>=6 && t.h<13);
  if (!hasMornCard && !hasAfCard) return {count:0, types:[]};

  let count=0, types=[];
  if (hasAfCard) {
    let cls = classifyPunchTimes(times);
    cls = adjustClassified(cls, dept, times);
    const hasMornStart = cls.morning_start.length > 0;
    const hasNoonEnd = cls.noon_end.length > 0;
    const hasAfStart = cls.afternoon_start.length > 0;
    const hasAfEnd = cls.afternoon_end.length > 0;
    const hasOtEnd = cls.overtime_end.length > 0;
    const hasNoonArr = normal.some(t => {const m=timeToMin(t); return m>=12*60+30 && m<13*60+30;});

    if (hasMornStart || hasNoonEnd) {
      if (!hasMornStart) { count++; types.push('morning_start'); }
      if (!hasNoonEnd) { count++; types.push('noon_end'); }
    }
    const hasAfWork = hasAfStart || hasAfEnd || hasOtEnd;
    if (hasAfWork) {
      // 缺afternoon_start：没有afternoon_start也没有noon_buffer区间的卡
      // 有afternoon_end/overtime_start说明下午来了，不判缺afternoon_start
      if (!hasAfStart && !hasNoonArr && !hasAfEnd && !cls.overtime_start.length) { count++; types.push('afternoon_start'); }
      if (!hasAfEnd && !cls.overtime_start.length) { count++; types.push('afternoon_end'); }
    }
    if (hasOtEnd && !cls.overtime_start.length && !hasAfEnd) { count++; types.push('overtime_start'); }
  } else if (hasMornCard) {
    const mornCards = normal.filter(t=>t.h<13);
    if (mornCards.length >= 2) {}
    else {
      if (mornCards[0].h >= 10) { count++; types.push('morning_start'); }
      else { count++; types.push('noon_end'); }
    }
  }
  return {count, types};
}

// 凌晨卡跨天处理
function preprocessCrossMidnight(empDays, dept) {
  const processed = [...empDays];
  const isWeisheng = dept && dept.includes('卫生');
  const midCutoff = isWeisheng ? 5 : 6;
  // 首日凌晨卡处理
  if (processed.length && processed[0]) {
    const day0Times = parseTimes(processed[0]);
    const midnights = day0Times.filter(t=>t.h<midCutoff);
    const normals = day0Times.filter(t=>t.h>=midCutoff);
    if (midnights.length && normals.length) {
      processed[0] = normals.sort((a,b)=>timeToMin(a)-timeToMin(b)).map(t=>`${String(t.h).padStart(2,'0')}:${String(t.m).padStart(2,'0')}`).join('\n');
    }
  }
  for (let d = 0; d < processed.length - 1; d++) {
    const todayStr = processed[d];
    const tomorrowStr = processed[d+1];
    if (!todayStr || !tomorrowStr) continue;
    const todayTimes = parseTimes(todayStr);
    const tomorrowTimes = parseTimes(tomorrowStr);
    if (!todayTimes.length || !tomorrowTimes.length) continue;
    const todayNormal = todayTimes.filter(t=>t.h>=midCutoff);
    if (!todayNormal.length) continue;
    const lastToday = todayNormal.reduce((a,b)=>timeToMin(a)>=timeToMin(b)?a:b);
    if (lastToday.h < 17) continue;
    const tomorrowMidnights = tomorrowTimes.filter(t=>t.h<midCutoff);
    if (!tomorrowMidnights.length) continue;
    const midnight = tomorrowMidnights.reduce((a,b)=>timeToMin(a)<=timeToMin(b)?a:b);
    const newToday = [...todayTimes, midnight].sort((a,b)=>{
      const ka = a.h<midCutoff?1440+timeToMin(a):timeToMin(a);
      const kb = b.h<midCutoff?1440+timeToMin(b):timeToMin(b);
      return ka-kb;
    });
    const newTomorrow = tomorrowTimes.filter(t=>!(t.h===midnight.h&&t.m===midnight.m));
    processed[d] = newToday.map(t=>`${String(t.h).padStart(2,'0')}:${String(t.m).padStart(2,'0')}`).join('\n');
    processed[d+1] = newTomorrow.length ? newTomorrow.map(t=>`${String(t.h).padStart(2,'0')}:${String(t.m).padStart(2,'0')}`).join('\n') : '';
  }
  return processed;
}

let rawWorkbook = null;
let employees = [];
let dateHeaders = [];
let satSunCols = [];
let empStats = [];
let processedResult = null;
let hasNextMonthCol = false;  // 是否有下月1号列（凌晨卡跨天用）

const uploadArea = document.getElementById('uploadArea');
const fileInput = document.getElementById('fileInput');

uploadArea.addEventListener('click', () => fileInput.click());

// 全局 + uploadArea 都阻止默认拖拽行为
function preventDrag(e) { e.preventDefault(); e.stopPropagation(); }
['dragenter','dragover','dragleave','drop'].forEach(name => {
  document.addEventListener(name, preventDrag);
  uploadArea.addEventListener(name, preventDrag);
});
uploadArea.addEventListener('dragenter', () => uploadArea.classList.add('drag-over'));
uploadArea.addEventListener('dragover', () => uploadArea.classList.add('drag-over'));
uploadArea.addEventListener('dragleave', e => {
  if (!e.relatedTarget || !uploadArea.contains(e.relatedTarget)) uploadArea.classList.remove('drag-over');
});
uploadArea.addEventListener('drop', e => {
  uploadArea.classList.remove('drag-over');
  const f = e.dataTransfer.files[0];
  if (f) handleFile(f);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

function fixSheetRef(wb) {
  // 修复得力导出的xlsx文件dimension错误（如4月文件!ref=A1:AI2，实际数据有570行）
  // 策略：遍历所有sheet，用实际行号范围覆盖!ref
  for (const sn of wb.SheetNames) {
    const ws = wb.Sheets[sn];
    if (!ws['!ref']) continue;
    // 找到所有行号（行号=属性名去掉列字母，如A3→3, Z100→100）
    let maxR = 0;
    const refMatch = ws['!ref'].match(/^([A-Z]+)(\d+):([A-Z]+)(\d+)$/i);
    if (!refMatch) continue;
    const minCol = refMatch[1], minRow = parseInt(refMatch[2]);
    const origMaxCol = refMatch[3], origMaxRow = parseInt(refMatch[4]);
    // 遍历所有cell，找最大行号
    for (const key in ws) {
      if (key[0] === '!') continue;
      const m = key.match(/^([A-Z]+)(\d+)$/);
      if (m) {
        const r = parseInt(m[2]);
        if (r > maxR) maxR = r;
      }
    }
    if (maxR > origMaxRow) {
      ws['!ref'] = minCol + minRow + ':' + origMaxCol + maxR;
      console.log('修复sheet ' + sn + ' !ref: ' + ws['!ref'] + ' (原: ' + minCol + minRow + ':' + origMaxCol + origMaxRow + ')');
    }
  }
}

function handleFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    rawWorkbook = XLSX.read(e.target.result, {type:'array', raw:false, cellDates:false, cellText:true, cellNF:false});
    fixSheetRef(rawWorkbook); // 修复dimension错误
    parseExcel();
    document.getElementById('fileInfo').textContent = `✓ 已加载：${file.name}（${employees.length} 名员工，${dateHeaders.length} 天数据）`;
    document.getElementById('fileInfo').classList.remove('hidden');
    document.getElementById('btnProcess').disabled = false;
    logMsg('ok', `文件解析成功：${employees.length} 名员工，${dateHeaders.length} 个日期列`);
  };
  reader.readAsArrayBuffer(file);
}

function parseExcel() {
  const ws = rawWorkbook.Sheets[rawWorkbook.SheetNames[0]];
  // blankrows: true 确保空行不丢失（row2是空行，不能跳过）
  const data = XLSX.utils.sheet_to_json(ws, {header:1, raw:false, defval:'', blankrows:true});

  // ---- 自动检测表头行（row1）和员工数据起始行 ----
  // 得力导出格式：row1=表头(姓名/工号/部门+日期), row2=空行, row3+=员工
  // 但 SheetJS 某些情况下可能跳过空行，所以不能硬编码 i=2
  // 策略：找到第一个col1="姓名"的行作为表头行，之后的非空行作为员工数据

  let headerRowIdx = -1;
  let empStartIdx = -1;
  for (let i = 0; i < data.length; i++) {
    const c0 = String(data[i][0] || '').trim();
    const c1 = String(data[i][1] || '').trim();
    const c2 = String(data[i][2] || '').trim();
    if (c0 === '姓名' && (c1 === '工号' || c2 === '部门' || c1.includes('工号') || c2.includes('部门'))) {
      headerRowIdx = i;
      continue;
    }
    // 表头行之后的第一个有姓名的行就是员工起始行
    if (headerRowIdx >= 0 && empStartIdx < 0 && c0 && c0 !== 'nan' && c0 !== '姓名') {
      empStartIdx = i;
      break;
    }
  }

  if (headerRowIdx < 0) {
    alert('文件格式不对，未找到表头行（姓名/工号/部门）');
    return;
  }
  if (empStartIdx < 0) {
    alert('文件格式不对，未找到员工数据');
    return;
  }

  const headers = data[headerRowIdx];

  // 获取日期列（col4开始），同时确定最大列数（避免空列导致某些员工days长度不一致）
  const rawDateHeaders = [];
  let maxCol = headers.length;
  for (let i = empStartIdx; i < data.length; i++) {
    if (data[i].length > maxCol) maxCol = data[i].length;
  }
  for (let j = 3; j < maxCol; j++) {
    rawDateHeaders.push(String(headers[j] || ''));
  }

  // 过滤掉末尾的空列（得力导出可能保留空列，或导出不全月时后续列为空）
  let trimEnd = rawDateHeaders.length;
  while (trimEnd > 0 && rawDateHeaders[trimEnd - 1].trim() === '') trimEnd--;

  const trimmedHeaders = rawDateHeaders.slice(0, trimEnd);
  if (trimmedHeaders.length === 0) {
    alert('文件格式不对，未找到日期列');
    return;
  }

  // 检测下月1号列：最后一个日期列的月份是否不同于第一个日期列的月份
  let firstMonth = null, lastMonth = null;
  for (const h of trimmedHeaders) {
    const m = h.match(/(\d{1,2})-(\d{1,2})/);
    if (m) {
      if (firstMonth === null) firstMonth = parseInt(m[1]);
      lastMonth = parseInt(m[1]);
    }
  }
  hasNextMonthCol = false;
  if (firstMonth !== null && lastMonth !== null && lastMonth !== firstMonth) {
    hasNextMonthCol = true; // 最后一列是下月1号
  } else if (firstMonth !== null && trimmedHeaders.length >= 2) {
    // 同月份：检查最后一列是否是"01"号（下月1号）
    const lastDate = trimmedHeaders[trimmedHeaders.length - 1];
    const lm = lastDate.match(/(\d{1,2})-(\d{1,2})/);
    if (lm) {
      const lastDay = parseInt(lm[2]);
      const prevDate = trimmedHeaders[trimmedHeaders.length - 2];
      const pm = prevDate.match(/(\d{1,2})-(\d{1,2})/);
      if (pm) {
        const prevDay = parseInt(pm[2]);
        // 如果最后一列是1号，且倒数第二列是28/29/30/31（说明是跨月）
        if (lastDay === 1 && prevDay >= 28) {
          hasNextMonthCol = true;
        }
      }
    }
  }

  // 如果有下月1号列，去掉它（它只用于凌晨卡跨天，不计入出勤/加班/迟到）
  if (hasNextMonthCol) {
    dateHeaders = trimmedHeaders.slice(0, -1);
  } else {
    dateHeaders = trimmedHeaders;
  }

  satSunCols = [];

  // 第一优先：从表头文字中找"周六"/"周日"
  for (let i = 0; i < dateHeaders.length; i++) {
    const h = String(dateHeaders[i]);
    if (h.includes('周六') || h.includes('周日')) satSunCols.push(i);
  }

  // 如果表头没有星期信息，尝试从"MM-DD"格式日期解析出星期
  if (satSunCols.length === 0) {
    let detectedYear = new Date().getFullYear();
    let detectedMonth = null;
    for (let i = 0; i < dateHeaders.length; i++) {
      const h = String(dateHeaders[i]);
      const m = h.match(/(\d{1,2})-(\d{1,2})/);
      if (m) {
        if (!detectedMonth) detectedMonth = parseInt(m[1]);
        const month = parseInt(m[1]);
        const day = parseInt(m[2]);
        const effectiveYear = (detectedMonth && month < detectedMonth) ? detectedYear + 1 : detectedYear;
        try {
          const d = new Date(effectiveYear, month - 1, day);
          const dow = d.getDay();
          if (dow === 0 || dow === 6) satSunCols.push(i);
        } catch(e) {}
      }
    }
  }

  // 如果还是找不到，显示月份补填框，等待用户输入
  if (satSunCols.length === 0) {
    const now = new Date();
    document.getElementById('inputYear').value = now.getFullYear();
    document.getElementById('inputMonth').value = now.getMonth() + 1;
    document.getElementById('monthPickerBox').classList.remove('hidden');
    document.getElementById('monthPickerStatus').textContent = '';
  } else {
    document.getElementById('monthPickerBox').classList.add('hidden');
  }

  employees = [];
  for (let i = empStartIdx; i < data.length; i++) {
    const row = data[i];
    const name = String(row[0]||'').trim();
    if (!name || name === 'nan') continue;
    const days = [];
    for (let j = 3; j < 3 + rawDateHeaders.length; j++) {
      const v = String(row[j]||'').trim();
      days.push(v === 'nan' ? '' : v);
    }
    employees.push({name, id: String(row[1]||'').trim(), dept: String(row[2]||'').trim(), days});
  }

  logMsg('ok', `日期列: ${dateHeaders.length}天${hasNextMonthCol ? ' + 下月1号列' : ''}, 周末列: ${satSunCols.length}个`);
}

function logMsg(type, msg) {
  const div = document.getElementById('logArea');
  const line = document.createElement('div');
  line.className = type === 'ok' ? 'log-ok' : type === 'warn' ? 'log-warn' : 'log-err';
  line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  div.appendChild(line);
  div.scrollTop = div.scrollHeight;
}

// 手动补填月份后，根据年月重新计算周末列
function applyManualMonth() {
  const year = parseInt(document.getElementById('inputYear').value);
  const month = parseInt(document.getElementById('inputMonth').value);
  if (!year || !month || month < 1 || month > 12) {
    document.getElementById('monthPickerStatus').textContent = '请输入有效年月';
    document.getElementById('monthPickerStatus').style.color = '#ff4d4f';
    return;
  }
  // 从dateHeaders中提取每天的日子（MM-DD格式），用指定年月计算星期
  satSunCols = [];
  for (let i = 0; i < dateHeaders.length; i++) {
    const h = String(dateHeaders[i]);
    const m = h.match(/(\d{1,2})-(\d{1,2})/);
    if (m) {
      const day = parseInt(m[2]);
      try {
        const d = new Date(year, month - 1, day);
        const dow = d.getDay(); // 0=周日, 6=周六
        if (dow === 0 || dow === 6) satSunCols.push(i);
      } catch(e) {}
    }
  }
  if (satSunCols.length > 0) {
    document.getElementById('monthPickerStatus').textContent = `已识别 ${satSunCols.length} 个周末列`;
    document.getElementById('monthPickerStatus').style.color = '#52c41a';
  } else {
    document.getElementById('monthPickerStatus').textContent = '未能识别周末列，请检查日期格式';
    document.getElementById('monthPickerStatus').style.color = '#ff4d4f';
  }
}

async function startProcess() {
  document.getElementById('btnProcess').disabled = true;
  document.getElementById('progressArea').classList.remove('hidden');
  setProgress(0, '加载班次配置...');

  // 先加载config.json
  const loaded = await loadConfig();

function processEmployee(emp) {
  const dept = emp.dept;
  const isNoOt = dept.includes('保安') || dept.includes('卫生');
  const processedDays = preprocessCrossMidnight([...emp.days], dept);

  const stats = {
    name: emp.name, id: emp.id, dept,
    平时出勤天数:0, 平时加班工时:0, 周末天数:0, 周末加班工时:0,
    法定假日天数:0, 调休天数:0, 有薪天数:0,
    迟到次数:0, 缺卡次数:0,
    '0点':0,'1点':0,'2点':0,'3点':0,
    '迟到1-10分':0,'迟到11-30分':0,'迟到31-59分':0,'迟到1小时以上':0,
    加班总时长:0, 备注:'',
    overtimeDaily:[], isWeekendDaily:[], lateDaily:[], latePunchDaily:[], missingDaily:[], halfDayDaily:[],
    processedDays,     // 计算用（含跨天凌晨卡归入前一天，可能含下月1号列）
    rawDays: emp.days,  // 显示用（原始数据，可能含下月1号列）
  };

  // 只遍历 dateHeaders.length 天（不含下月1号）
  const dayLimit = dateHeaders.length;
  for (let dayIdx = 0; dayIdx < dayLimit; dayIdx++) {
    const timesStr = processedDays[dayIdx];
    if (!timesStr || timesStr.trim() === '' || timesStr.trim() === '-') {
      stats.overtimeDaily.push(0); stats.isWeekendDaily.push(false);
      stats.lateDaily.push(false); stats.latePunchDaily.push(null); stats.missingDaily.push([]); stats.halfDayDaily.push(false);
      continue;
    }
    let times = parseTimes(timesStr);
    if (!times.length) {
      stats.overtimeDaily.push(0); stats.isWeekendDaily.push(false);
      stats.lateDaily.push(false); stats.latePunchDaily.push(null); stats.missingDaily.push([]); stats.halfDayDaily.push(false);
      continue;
    }
    times = dedupTimes(times);
    const hdr = String(dateHeaders[dayIdx]||'');
    const isWeekend = hdr.includes('周六') || hdr.includes('周日');
    stats.isWeekendDaily.push(isWeekend);

    // === 迟到判断 ===
    let late=false, latePunch=null, lateMin=0;
    const midCutoff = (dept.includes('保安') || dept.includes('卫生')) ? 5 : 6;
    const normalTimes = times.filter(t=>t.h>=midCutoff);
    if (dept.includes('保安') || dept.includes('卫生')) {
      if (dept.includes('保安')) {
        // 保安组：早班06:30 / 晚班16:00
        const hasMorn = normalTimes.some(t=>t.h<12);
        const hasEve = normalTimes.some(t=>t.h>=15 && t.h<17);
        if (hasMorn) {
          const first = normalTimes.filter(t=>t.h<12).reduce((a,b)=>timeToMin(a)<=timeToMin(b)?a:b);
          if (timeToMin(first) > 6*60+30) {
            late=true; latePunch=`${String(first.h).padStart(2,'0')}:${String(first.m).padStart(2,'0')}`;
            lateMin = timeToMin(first) - (6*60+30);
          }
        }
        if (hasEve && !late) {
          const first = normalTimes.filter(t=>t.h>=15&&t.h<17).reduce((a,b)=>timeToMin(a)<=timeToMin(b)?a:b);
          if (timeToMin(first) > 16*60) {
            late=true; latePunch=`${String(first.h).padStart(2,'0')}:${String(first.m).padStart(2,'0')}`;
            lateMin = timeToMin(first) - 16*60;
          }
        }
      } else {
        // 卫生组：只有06:30-16:30早班
        const hasMorn = normalTimes.some(t=>t.h<12);
        if (hasMorn) {
          const first = normalTimes.filter(t=>t.h<12).reduce((a,b)=>timeToMin(a)<=timeToMin(b)?a:b);
          if (timeToMin(first) > 6*60+30) {
            late=true; latePunch=`${String(first.h).padStart(2,'0')}:${String(first.m).padStart(2,'0')}`;
            lateMin = timeToMin(first) - (6*60+30);
          }
        }
      }
    } else if (normalTimes.length) {
      // 迟到判断：用班次匹配推断出的上班时间作为基准
      // 班次匹配用四条件法（能上满→最接近→优先不迟到→卡型吻合），比部门最早start更精准
      // 上7:58匹配到8:00班 → 不迟到；上7:48匹配到8:00班 → 不迟到
      const hasMorn = normalTimes.some(t=>t.h<12);
      if (hasMorn) {
        const first = normalTimes.filter(t=>t.h<12).reduce((a,b)=>timeToMin(a)<=timeToMin(b)?a:b);
        const shiftStart = getShiftStartFromDept(times, dept);
        if (timeToMin(first) > timeToMin(shiftStart)) {
          late=true; latePunch=`${String(first.h).padStart(2,'0')}:${String(first.m).padStart(2,'0')}`;
          lateMin = timeToMin(first) - timeToMin(shiftStart);
        }
      }
    }
    if (late) {
      stats.迟到次数++;
      if (lateMin>=1&&lateMin<=10) stats['迟到1-10分']++;
      else if (lateMin<=30) stats['迟到11-30分']++;
      else if (lateMin<=59) stats['迟到31-59分']++;
      else stats['迟到1小时以上']++;
    }
    stats.lateDaily.push(late); stats.latePunchDaily.push(latePunch);

    // === 出勤/加班 ===
    const {attendanceDays, paidDays, overtimeHours, halfDay} = calcShiftAndOvertime(times, dept, dayIdx, processedDays);
    if (isWeekend) { stats.周末天数 += attendanceDays; stats.周末加班工时 += overtimeHours; }
    else { stats.平时出勤天数 += attendanceDays; stats.平时加班工时 += overtimeHours; }
    stats.overtimeDaily.push(overtimeHours);
    stats.halfDayDaily.push(halfDay);

    // 0-3点统计（所有人包括保安/卫生组）
    if (times.length) {
      const last = times[times.length-1];
      if (last.h < 6) {
        if (last.h===0) stats['0点']++; else if (last.h===1) stats['1点']++;
        else if (last.h===2) stats['2点']++; else if (last.h===3) stats['3点']++;
      }
    }

    // 缺卡
    const {count: mc, types: mt} = calcMissingCards(times, dept);
    stats.缺卡次数 += mc;
    stats.missingDaily.push(mt);
  }

  stats.有薪天数 = stats.平时出勤天数 + stats.周末天数 + stats.法定假日天数 + stats.调休天数;
  stats.加班总时长 = stats.平时加班工时 + stats.周末加班工时;
  return stats;
}

function renderPreview() {
  const preview = empStats.slice(0, 20);
  const dayCount = dateHeaders.length;
  // 只显示前15个日期列，避免太宽
  const showDays = Math.min(dayCount - 1, 15);

  let html = '<table><thead><tr>';
  html += '<th>姓名</th><th>工号</th><th>部门</th>';
  for (let i = 0; i < showDays; i++) {
    const isWe = satSunCols.includes(i);
    html += `<th class="${isWe?'orange-bg':''}">${String(dateHeaders[i]).replace(/\n/,'<br>')}</th>`;
  }
  html += '<th>平时出勤</th><th>周末天数</th><th>有薪天数</th><th>迟到次数</th><th>缺卡次数</th><th>加班总时长</th>';
  html += '</tr></thead><tbody>';

  for (const st of preview) {
    // 打卡行
    html += `<tr><td rowspan="2">${st.name}</td><td rowspan="2">${st.id}</td><td rowspan="2">${st.dept}</td>`;
    for (let i = 0; i < showDays; i++) {
      const isWe = satSunCols.includes(i);
      const rawDay = st.rawDays[i] || '';
      const missing = st.missingDaily[i] || [];
      const latePunch = st.latePunchDaily[i];
      const halfDay = st.halfDayDaily[i];
      let lines = rawDay ? rawDay.split('\n') : [];
      // 插入缺卡标记
      const insertions = [];
      for (const mt of missing) {
        if (mt==='morning_start') insertions.push({pos:0,label:'缺卡'});
        else if (mt==='noon_end') { let p=lines.findIndex(l=>{ try{return parseInt(l.split(':')[0])>=13;}catch{return false;}}); if(p<0)p=lines.length; insertions.push({pos:p,label:'缺卡'}); }
        else if (mt==='afternoon_start') { let p=lines.findIndex(l=>{try{const h=parseInt(l.split(':')[0]);return h>=17||l==='缺卡';}catch{return false;}}); if(p<0)p=lines.length; insertions.push({pos:p,label:'缺卡'}); }
        else if (mt==='afternoon_end') { let p=lines.findIndex(l=>{try{const h=parseInt(l.split(':')[0]);return h>=18||l==='缺卡';}catch{return false;}}); if(p<0)p=lines.length; insertions.push({pos:p,label:'缺卡'}); }
        else insertions.push({pos:lines.length, label:'缺卡'});
      }
      insertions.sort((a,b)=>b.pos-a.pos);
      for (const ins of insertions) lines.splice(ins.pos,0,'缺卡');
      // 插入半天标记
      if (halfDay) {
        let firstCardLine = lines.find(l => l !== '缺卡');
        let firstCardHour = 12;
        if (firstCardLine) { try { firstCardHour = parseInt(firstCardLine.split(':')[0]); } catch(e) {} }
        if (firstCardHour < 12) lines.push('半天');
        else lines.unshift('半天');
      }
      const cellHtml = lines.map(l=> l==='缺卡' ? `<span class="red">缺卡</span>` : l==='半天' ? `<span class="red">半天</span>` : (l===latePunch ? `<span class="red">${l}</span>` : l)).join('<br>');
      html += `<td class="punch-cell ${isWe?'orange-bg':''}">${cellHtml}</td>`;
    }
    // 统计列（rowspan=2）
    html += `<td rowspan="2">${st.平时出勤天数}</td><td rowspan="2">${st.周末天数}</td><td rowspan="2">${st.有薪天数}</td>`;
    html += `<td rowspan="2" class="${st.迟到次数>0?'red':''}">${st.迟到次数}</td>`;
    html += `<td rowspan="2" class="${st.缺卡次数>0?'red':''}">${st.缺卡次数}</td>`;
    html += `<td rowspan="2" class="${st.加班总时长>0?'red':''}">${st.加班总时长||''}</td>`;
    html += '</tr>';
    // 加班行
    html += '<tr>';
    for (let i = 0; i < showDays; i++) {
      const isWe = satSunCols.includes(i);
      const ot = st.overtimeDaily[i];
      html += `<td class="${isWe?'orange-bg':''} ${ot&&ot!==0?'red':''}">${ot&&ot!==0?ot:''}</td>`;
    }
    html += '</tr>';
  }
  html += '</tbody></table>';
  document.getElementById('previewTable').innerHTML = html;
}

function buildCellText(processedDay, missingTypes, latePunch, halfDay) {
  // 构建打卡文本，插入缺卡标记，返回 rich text segments
  let lines = processedDay ? processedDay.split('\n') : [];

  // 插入缺卡标记
  if (missingTypes && missingTypes.length) {
    const insertions = [];
    for (const mt of missingTypes) {
      if (mt === 'morning_start') {
        insertions.push({ pos: 0, label: '缺卡' });
      } else if (mt === 'noon_end') {
        let p = lines.findIndex(l => { try { return parseInt(l.split(':')[0]) >= 13; } catch(e) { return false; } });
        if (p < 0) p = lines.length;
        insertions.push({ pos: p, label: '缺卡' });
      } else if (mt === 'afternoon_start') {
        // 找第一个下午时段(>=13:00)的卡前面插入，表示缺的是下午上班卡
        let p = lines.findIndex(l => { try { const h = parseInt(l.split(':')[0]); return h >= 13 || l === '缺卡'; } catch(e) { return false; } });
        if (p < 0) p = lines.length;
        insertions.push({ pos: p, label: '缺卡' });
      } else if (mt === 'afternoon_end') {
        let p = lines.findIndex(l => { try { const h = parseInt(l.split(':')[0]); return h >= 18 || l === '缺卡'; } catch(e) { return false; } });
        if (p < 0) p = lines.length;
        insertions.push({ pos: p, label: '缺卡' });
      } else {
        insertions.push({ pos: lines.length, label: '缺卡' });
      }
    }
    insertions.sort((a, b) => b.pos - a.pos);
    for (const ins of insertions) lines.splice(ins.pos, 0, '缺卡');
  }

  // 插入半天标记
  if (halfDay) {
    // 判断第一条实际打卡时间（排除"缺卡"标记）属于上午还是下午
    // 找第一条非"缺卡"的行
    let firstCardLine = lines.find(l => l !== '缺卡');
    let firstCardHour = 12; // 默认下午
    if (firstCardLine) {
      try { firstCardHour = parseInt(firstCardLine.split(':')[0]); } catch(e) {}
    }
    if (firstCardHour < 12) {
      // 上午卡在前 → 半天放在最后
      lines.push('半天');
    } else {
      // 下午卡在前 → 半天放在最前
      lines.unshift('半天');
    }
  }

  // 构建 rich text: [{text, color}]
  const segments = [];
  for (let i = 0; i < lines.length; i++) {
    const l = lines[i];
    if (i > 0) segments.push({ text: '\n', color: '000000' });
    if (l === '缺卡') {
      segments.push({ text: '缺卡', color: 'FF0000' });
    } else if (l === '半天') {
      segments.push({ text: '半天', color: 'FF0000' });
    } else if (l === latePunch) {
      segments.push({ text: l, color: 'FF0000' });
    } else {
      segments.push({ text: l, color: '000000' });
    }
  }
  return segments;
}

// 禁用Excel自动调整行高（防止打开后自动改变行高列宽）
const JSZIP_CDN = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';

async function fixRowHeights(xlsxBuffer) {
  if (!window.JSZip) {
    await new Promise((resolve, reject) => {
      const s = document.createElement('script');
      s.src = JSZIP_CDN;
      s.onload = resolve;
      s.onerror = reject;
      document.head.appendChild(s);
    });
  }
  const zip = await JSZip.loadAsync(xlsxBuffer);
  const sheetFile = zip.file('xl/worksheets/sheet1.xml');
  if (!sheetFile) return xlsxBuffer;
  let xml = await sheetFile.async('string');
  xml = xml.replace(/<row /g, '<row customHeight="1" autoFitHeight="0" ');
  zip.file('xl/worksheets/sheet1.xml', xml);
  return await zip.generateAsync({ type: 'arraybuffer' });
}

async function exportExcel() {
  logMsg('ok', '开始生成Excel（完整格式）...');

  const wb = new ExcelJS.Workbook();
  wb.creator = '考勤记录处理工具';
  wb.created = new Date();

  const ws = wb.addWorksheet('考勤记录', {
    properties: { defaultRowHeight: 18 }
  });

  const NEW_COLS = ['平时','周末','共计','平时出勤天数','平时加班工时','周末天数','周末加班工时',
    '法定假日天数','调休天数','有薪天数','迟到次数','缺卡次数','0点','1点','2点','3点',
    '迟到1-10分','迟到11-30分','迟到31-59分','迟到1小时以上','加班总时长','备注','签名确认'];

  const dayCount = dateHeaders.length; // 不含下月1号
  const totalCols = 3 + dayCount + NEW_COLS.length;

  // ---- 列宽（对照Python版） ----
  ws.getColumn(1).width = 10;   // 姓名
  ws.getColumn(2).width = 12;   // 工号
  ws.getColumn(3).width = 12;   // 部门
  for (let i = 0; i < dayCount; i++) ws.getColumn(4 + i).width = 7;
  for (let i = 0; i < NEW_COLS.length; i++) {
    if (i === 19) ws.getColumn(4 + dayCount + i).width = 25;  // 加班总时长
    else ws.getColumn(4 + dayCount + i).width = 8;
  }

  // ---- 冻结窗格 ----
  ws.views = [{ state: 'frozen', ySplit: 1, xSplit: 3, topLeftCell: 'D2', activeCell: 'A1' }];

  // ---- 样式定义（对照Python版 make_attendance_D4_march.py） ----
  const thinBorder = {
    top: { style: 'thin', color: { argb: 'FF000000' } },
    left: { style: 'thin', color: { argb: 'FF000000' } },
    bottom: { style: 'thin', color: { argb: 'FF000000' } },
    right: { style: 'thin', color: { argb: 'FF000000' } }
  };
  const centerAlign = { vertical: 'middle', horizontal: 'center', wrapText: true };

  // 周末橙色（对照Python版 FFC000）
  const orangeFill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFFFC000' } };
  // 表头灰色背景（对照Python版 646A73，从原始考勤表继承）
  const headerFill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF646A73' } };
  // 表头字体：宋体12号白色（Python版从原始考勤表继承，不加粗）
  const headerFont = { name: '宋体', size: 12, bold: false, color: { argb: 'FFFFFFFF' } };
  // 数据行字体：宋体12号（Python版 NORMAL_FONT = Font(size=12)，不指定name即默认宋体）
  const normalFont = { name: '宋体', size: 12, color: { argb: 'FF000000' } };
  const redFont = { name: '宋体', size: 12, color: { argb: 'FFFF0000' } };
  const redBoldFont = { name: '宋体', size: 12, color: { argb: 'FFFF0000' } };
  const richTextBlackFont = { name: '宋体', size: 12, color: { argb: 'FF000000' } };
  const richTextRedFont = { name: '宋体', size: 12, color: { argb: 'FFFF0000' } };

  // ---- 第1行：表头 ----
  const headerRow = ws.getRow(1);
  headerRow.height = 30;
  headerRow.values = ['姓名', '工号', '部门', ...dateHeaders.map(h => String(h)), ...NEW_COLS];
  headerRow.eachCell({ includeEmpty: true }, (cell, colNum) => {
    cell.font = headerFont;
    cell.alignment = centerAlign;
    cell.border = thinBorder;
    cell.fill = headerFill;
  });
  // 周末列橙色（覆盖深灰）
  for (const idx of satSunCols) {
    const c = headerRow.getCell(4 + idx);
    c.fill = orangeFill;
  }

  // ---- 数据行 ----
  let excelRow = 2;
  for (const st of empStats) {
    const rowA_Num = excelRow;
    const rowB_Num = excelRow + 1;

    // === Row A: 打卡时间 ===
  const rowA = ws.getRow(rowA_Num);
  rowA.height = 130;

    // 前三列（rowA+B合并）
    rowA.getCell(1).value = st.name;
    rowA.getCell(2).value = st.id;
    rowA.getCell(3).value = st.dept;

    // 每日打卡列（用原始数据 rawDays，只导出 dateHeaders.length 天，不含下月1号）
    for (let i = 0; i < dateHeaders.length; i++) {
      const segments = buildCellText(st.rawDays[i] || '', st.missingDaily[i], st.latePunchDaily[i], st.halfDayDaily[i]);
      const cell = rowA.getCell(4 + i);
      // 用 rich text，全部宋体12号
      const richParts = segments.map(seg => ({
        text: seg.text,
        font: seg.color === 'FF0000' ? { ...richTextRedFont } : { ...richTextBlackFont }
      }));
      cell.value = { richText: richParts };
      cell.alignment = centerAlign;
    }

    // 平时/周末/共计 → RowA 留空（RowB写公式）
    const sumColStart = 4 + dayCount; // AJ列开始
    rowA.getCell(sumColStart).value = '';
    rowA.getCell(sumColStart + 1).value = '';
    rowA.getCell(sumColStart + 2).value = '';

    // 后20列统计（RowA）
    // 平时加班工时和周末加班工时：RowA写公式引用平时/周末列，然后合并
    const colLetter = (n) => {
      let s = '';
      let t = n;
      while (t > 0) { t--; s = String.fromCharCode(65 + (t % 26)) + s; t = Math.floor(t / 26); }
      return s;
    };
    const pingCol = colLetter(sumColStart);       // 平时列
    const zhouCol = colLetter(sumColStart + 1); // 周末列
    const statRowA_Values = [
      st.平时出勤天数, {formula:`=${pingCol}${rowA_Num}`}, st.周末天数, {formula:`=${zhouCol}${rowA_Num}`},
      st.法定假日天数, st.调休天数, st.有薪天数,
      st.迟到次数 || '', st.缺卡次数 || '',
      st['0点'] || '', st['1点'] || '', st['2点'] || '', st['3点'] || '',
      st['迟到1-10分'] || '', st['迟到11-30分'] || '', st['迟到31-59分'] || '', st['迟到1小时以上'] || '',
      st.加班总时长 || '', st.备注 || '', ''
    ];
    for (let i = 0; i < statRowA_Values.length; i++) {
      rowA.getCell(sumColStart + 3 + i).value = statRowA_Values[i];
    }

    // RowA 样式
    rowA.eachCell({ includeEmpty: true }, (cell, colNum) => {
      cell.border = thinBorder;
      cell.alignment = centerAlign;
      // richText cell 的字体由内部 segments 控制，不覆盖
      if (!cell.value || typeof cell.value !== 'object' || !cell.value.richText) {
        if (!cell.font || !cell.font.name || cell.font.name !== '宋体') {
          cell.font = normalFont;
        }
      }
    });

    // === Row B: 加班时长 ===
    const rowB = ws.getRow(rowB_Num);
    rowB.height = 20;

    // 前三列留空（合并）
    // 每日加班列
    for (let i = 0; i < st.overtimeDaily.length; i++) {
      const ot = st.overtimeDaily[i];
      const cell = rowB.getCell(4 + i);
      if (ot && ot !== 0) {
        cell.value = ot;
        cell.font = redFont;
      } else {
        cell.value = '';
      }
      cell.alignment = centerAlign;
    }

    // 找出工作日和周末的列号（dateHeaders已不含下月1号，所有列都参与统计）
    const weekdayCols = [], weekendCols = [];
    for (let i = 0; i < dayCount; i++) {
      const cl = colLetter(4 + i);
      if (satSunCols.includes(i)) weekendCols.push(cl);
      else weekdayCols.push(cl);
    }

    // 平时 = SUMIF rowA 是工作日
    const weekdaySum = weekdayCols.length ? weekdayCols.map(c => c + rowB_Num).join(',') : '';
    rowB.getCell(sumColStart).value = weekdaySum ? { formula: `SUM(${weekdaySum})` } : 0;
    rowB.getCell(sumColStart).font = redBoldFont;

    const weekendSum = weekendCols.length ? weekendCols.map(c => c + rowB_Num).join(',') : '';
    rowB.getCell(sumColStart + 1).value = weekendSum ? { formula: `SUM(${weekendSum})` } : 0;
    rowB.getCell(sumColStart + 1).font = redBoldFont;

    const pingCol = colLetter(sumColStart);
    const zhouCol = colLetter(sumColStart + 1);
    rowB.getCell(sumColStart + 2).value = { formula: `=${pingCol}${rowB_Num}+${zhouCol}${rowB_Num}` };
    rowB.getCell(sumColStart + 2).font = redBoldFont;

    // 后20列留空（平时加班工时和周末加班工时的公式已写在RowA，合并后显示RowA的值）
    for (let i = 0; i < 20; i++) {
      rowB.getCell(sumColStart + 3 + i).value = '';
    }

    // RowB 样式
    rowB.eachCell({ includeEmpty: true }, (cell, colNum) => {
      cell.border = thinBorder;
      cell.alignment = centerAlign;
      if (!cell.font || !cell.font.name || cell.font.name !== '宋体') {
        cell.font = normalFont;
      }
    });

    // 周末列橙色（两行都加）
    for (const idx of satSunCols) {
      rowA.getCell(4 + idx).fill = orangeFill;
      rowB.getCell(4 + idx).fill = orangeFill;
    }

    // === 合并单元格：姓名/工号/部门 ===
    for (let col = 1; col <= 3; col++) {
      ws.mergeCells(rowA_Num, col, rowB_Num, col);
    }

    // === RowA 统计列合并（全部合并，公式写在RowA上） ===
    for (let i = 0; i < statRowA_Values.length; i++) {
      ws.mergeCells(rowA_Num, sumColStart + 3 + i, rowB_Num, sumColStart + 3 + i);
    }

    excelRow += 2;
  }

  // ---- 生成文件 ----
  let buffer = await wb.xlsx.writeBuffer();

  // 修改xlsx zip中的sheet1.xml，给所有行加上 customHeight="1" autoFitHeight="0"
  // 这样Excel打开后不会自动调整行高
  buffer = await fixRowHeights(buffer);

  const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
  const now = new Date();
  const fname = `考勤记录表_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}.xlsx`;
  saveAs(blob, fname);
  logMsg('ok', `已导出：${fname}`);
}
</script>
